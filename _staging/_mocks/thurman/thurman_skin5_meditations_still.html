<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Meditations of the Heart — Howard Thurman</title>
<link rel="preconnect" href="https://fonts.googleapis.com"><link rel="preconnect" href="https://fonts.gstatic.com" crossorigin><link href="https://fonts.googleapis.com/css2?family=Newsreader:ital,opsz,wght@0,6..72,400;0,6..72,500;1,6..72,400&family=Inter:wght@400;500&display=swap" rel="stylesheet">
<style>
  :root{ --sk5-cream:#EFE3CC; --sk5-gold:#E7C97A; --sk5-ground:#0A0C0E; }
  html,body{margin:0}
  body{ background:var(--sk5-ground); color:var(--sk5-cream); font-family:'Inter',sans-serif;
    display:flex; align-items:center; justify-content:center; min-height:100vh; padding:24px; box-sizing:border-box; }
  .sk5-stage{ position:relative; width:min(92vw,560px); min-height:440px; border-radius:14px; overflow:hidden;
    display:flex; align-items:center; justify-content:center; }
  .sk5-canvas{ position:absolute; inset:0; z-index:0; }
  .sk5-content{ position:relative; z-index:1; text-align:center; padding:48px 34px; width:100%; box-sizing:border-box; }
  .sk5-kicker{ font-size:11px; letter-spacing:.34em; text-transform:uppercase; color:rgba(231,201,122,.72); margin-bottom:26px; }
  .sk5-who{ font-size:12.5px; letter-spacing:.16em; color:rgba(239,227,204,.6); margin-bottom:16px; }
  .sk5-title{ font-family:'Newsreader',serif; font-weight:500; font-size:32px; line-height:1.24; letter-spacing:.005em;
    color:var(--sk5-cream); margin:0 0 18px; min-height:1.24em; transition:opacity .9s ease; }
  .sk5-excerpt{ font-family:'Newsreader',serif; font-style:italic; font-weight:400; font-size:16.5px; line-height:1.6;
    color:rgba(239,227,204,.82); margin:0 auto 14px; max-width:30em; opacity:0; transition:opacity 1.1s ease; }
  .sk5-tag{ font-size:10.5px; letter-spacing:.22em; text-transform:uppercase; color:rgba(239,227,204,.42); margin-bottom:30px; min-height:1em; }
  .sk5-player{ opacity:0; transition:opacity 1s ease; margin-bottom:24px; }
  .sk5-player.sk5-on{ opacity:1; }
  .sk5-player audio{ width:100%; max-width:300px; height:32px; filter:saturate(.5) brightness(.94); }
  .sk5-note{ font-size:10px; letter-spacing:.08em; color:rgba(239,227,204,.4); margin-top:9px; font-style:italic; }
  .sk5-btn{ font-family:'Inter',sans-serif; font-size:13px; letter-spacing:.14em; color:var(--sk5-cream);
    background:rgba(30,24,16,.55); border:1px solid rgba(231,201,122,.32); border-radius:999px;
    padding:12px 30px; cursor:pointer; transition:background .5s ease,opacity .4s ease; }
  .sk5-btn:hover{ background:rgba(48,38,24,.7); }
  .sk5-btn:disabled{ opacity:.4; cursor:default; }
</style>
</head>
<body>
<div class="sk5-stage">
  <canvas class="sk5-canvas"></canvas>
  <div class="sk5-content">
    <div class="sk5-kicker">meditations of the heart</div>
    <div class="sk5-who">Howard Thurman</div>
    <h1 class="sk5-title">Spin to listen in</h1>
    <div class="sk5-excerpt">and let one of Thurman&rsquo;s meditations find you</div>
    <div class="sk5-tag"></div>
    <div class="sk5-player">
      <audio controls></audio>
      <div class="sk5-note">recording binds when the archive URL is surfaced</div>
    </div>
    <button class="sk5-btn">&#9702; Breathe</button>
  </div>
</div>
<script>
(function(){
  var SERMONS = [
    ["The Sound of the Genuine","there is a sound of the genuine in you","commencement meditation"],
    ["The Growing Edge","look well to the growing edge","meditation"],
    ["Jesus and the Disinherited","to those with their backs against the wall","the sermon series"],
    ["Freedom and Suffering","the fourth and final sermon","sermon series"],
    ["A Moment of Crisis","bending the will","recorded sermon"],
    ["Disciplines of the Spirit","commitment · suffering · prayer · reconciliation","1963"],
    ["Quests for the Human","the introductory lecture","lecture series"],
    ["Horn of the Wild Oxen","a recorded sermon","from the archive"],
    ["An Easter Message","his eighth talk","recorded sermon"],
    ["Prayers","Thurman reading his prayers aloud","recording"],
    ["Eulogy for Mordecai Wyatt Johnson","for his teacher","recorded"],
    ["On Religious Experience","religion as a deeply personal encounter","meditation"]
  ];
  var stage=document.querySelector('.sk5-stage'), canvas=document.querySelector('.sk5-canvas'), ctx=canvas.getContext('2d');
  var titleEl=document.querySelector('.sk5-title'), exEl=document.querySelector('.sk5-excerpt'),
      tagEl=document.querySelector('.sk5-tag'), btn=document.querySelector('.sk5-btn'),
      player=document.querySelector('.sk5-player');
  var reduce=window.matchMedia&&window.matchMedia('(prefers-reduced-motion: reduce)').matches;
  var W=0,H=0,dpr=Math.min(window.devicePixelRatio||1,2);
  function resize(){ var r=stage.getBoundingClientRect(); W=r.width; H=r.height; canvas.width=W*dpr; canvas.height=H*dpr; ctx.setTransform(dpr,0,0,dpr,0,0); }
  window.addEventListener('resize',resize); resize();

  var rings=[], maxR=Math.max(W,H)*0.62, bpm=60, dropQueue=[], schedT=0;
  function rand(){ return SERMONS[Math.floor(Math.random()*SERMONS.length)]; }
  function drop(){ rings.push({r:0.0001,t:0}); }
  // lub-dub: on each beat, schedule two drops ~150ms apart, then the beat rests
  function scheduleBeat(){ dropQueue.push(0); dropQueue.push(150); }

  function frame(ts){
    if(frame._p===undefined)frame._p=ts; var dt=ts-frame._p; frame._p=ts; if(dt>80)dt=80;
    maxR=Math.max(W,H)*0.62;
    var period=60000/bpm; schedT+=dt;
    if(schedT>=period){ schedT-=period; scheduleBeat(); }
    for(var q=dropQueue.length-1;q>=0;q--){ dropQueue[q]-=dt; if(dropQueue[q]<=0){ drop(); dropQueue.splice(q,1); } }
    var cx=W/2, cy=H/2;
    var g=ctx.createRadialGradient(cx,cy,0,cx,cy,maxR*1.2);
    g.addColorStop(0,'#15181B'); g.addColorStop(1,'#0A0C0E');
    ctx.fillStyle=g; ctx.fillRect(0,0,W,H);
    var speed=0.052*(bpm/60);
    for(var i=rings.length-1;i>=0;i--){ var rg=rings[i]; rg.t+=dt; rg.r=rg.t*speed;
      if(rg.r>maxR){ rings.splice(i,1); continue; }
      var a=(1-rg.r/maxR); a=a*a*0.5;
      ctx.beginPath(); ctx.arc(cx,cy,rg.r,0,6.283); ctx.strokeStyle='rgba(231,201,122,'+a.toFixed(3)+')'; ctx.lineWidth=1.1; ctx.stroke();
      ctx.beginPath(); ctx.arc(cx,cy,rg.r+2.5,0,6.283); ctx.strokeStyle='rgba(245,241,230,'+(a*0.5).toFixed(3)+')'; ctx.lineWidth=0.7; ctx.stroke();
    }
    var gg=ctx.createRadialGradient(cx,cy,0,cx,cy,26);
    gg.addColorStop(0,'rgba(231,201,122,0.30)'); gg.addColorStop(1,'rgba(231,201,122,0)');
    ctx.fillStyle=gg; ctx.beginPath(); ctx.arc(cx,cy,26,0,6.283); ctx.fill();
    raf=requestAnimationFrame(frame);
  }
  var raf=null, visible=true, onscreen=true;
  function run(){ if(raf==null&&visible&&onscreen){ frame._p=undefined; raf=requestAnimationFrame(frame); } }
  function stop(){ if(raf!=null){ cancelAnimationFrame(raf); raf=null; } }
  document.addEventListener('visibilitychange',function(){ visible=!document.hidden; visible?run():stop(); });
  if('IntersectionObserver' in window){ new IntersectionObserver(function(e){ onscreen=e[0].isIntersecting; onscreen?run():stop(); }).observe(stage); }
  if(reduce){ drop(); var cx=W/2,cy=H/2; ctx.beginPath(); ctx.arc(cx,cy,maxR*0.4,0,6.283); ctx.strokeStyle='rgba(231,201,122,0.28)'; ctx.lineWidth=1.1; ctx.stroke(); }
  else{ run(); }

  var STEPS=[72,72,88,104,128,160,208,272,352,464,608];
  function land(pick){
    titleEl.textContent=pick[0]; titleEl.style.opacity=0;
    exEl.textContent='“'+pick[1]+'”'; tagEl.textContent=pick[2];
    setTimeout(function(){ titleEl.style.opacity=1; exEl.style.opacity=1; player.classList.add('sk5-on'); },40);
    bpm=57; btn.disabled=false; btn.innerHTML='&#9702; Breathe again';
  }
  function spin(){
    btn.disabled=true; player.classList.remove('sk5-on'); exEl.style.opacity=0;
    if(reduce){ var n=0; var q=setInterval(function(){ titleEl.textContent=rand()[0]; if(++n>=3){ clearInterval(q); land(rand()); } },140); return; }
    var i=0;
    (function step(){
      if(i>=STEPS.length){ land(rand()); return; }
      titleEl.textContent=rand()[0]; titleEl.style.opacity=1;
      bpm=Math.min(100, 60+(i/STEPS.length)*40);
      setTimeout(step, STEPS[i++]);
    })();
  }
  btn.addEventListener('click',spin);
})();
</script>
</body>
</html>
<!--
METHODOLOGY FOOTER
HOW PRODUCED: design-SB bakeoff skin (Skin 5 of 5 rebuild), 2026-07-03 (S133). Howard Thurman
  "sermon roulette" — spin lands on a random Thurman sermon. Skin 5 = "Meditations of the Heart /
  Stillness", rendered as a heartbeat-on-still-water concept: concentric ripple rings emitted from
  centre in a lub-dub cadence (~60 bpm), quickening to ~100 bpm during spin, easing to ~57 bpm on
  land. Quietest / slowest / most reverent of the five skins. Slow decelerating title cycle
  [72..608 ms]. One rAF loop, dt accumulated from rAF timestamps (no wall-clock Date), dpr capped
  at 2, paused on hidden tab + off-screen; reduced-motion path draws one static ripple + 3-step cycle.
SCHOLARLY SOURCES: Howard Thurman (1899-1981), Black mystic-theologian; register contemplative,
  dignified, luminous ("the sound of the genuine"). Rendered from Thurman's own mystical-rooted
  horizon, no photo (© imagery avoided), no kitsch. Sermon titles embedded verbatim from provided data.
WHAT NEEDS VERIFICATION: Stage 6 = 0 coded passages — excerpt glosses + audio player are PLACEHOLDERS
  that bind to real primary-text / archive URLs later (§13 ghost-prevention: no invented Thurman
  lines; excerpt strings are short descriptive glosses / genuine phrase-fragments only, to be verified
  against source before any public use). Audio <audio> has NO src pending archive-URL resolution.
-->
