<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<title>The Luminous Darkness — a voice, drawn from the archive</title>
<link href="https://fonts.googleapis.com/css2?family=Newsreader:ital,opsz,wght@0,6..72,300;0,6..72,400;0,6..72,500;1,6..72,300;1,6..72,400&family=Inter:wght@300;400;500&family=IBM+Plex+Mono:wght@300;400&display=swap" rel="stylesheet">
<style>
  :root{
    --p4-ink0:#0A1E33;      /* deepest prussian */
    --p4-ink1:#0E2E4C;      /* mid cyanotype */
    --p4-ink2:#1B4A6B;      /* lifted blue */
    --p4-near-black:#05101C;
    --p4-pale:#DCEBF2;      /* photogram white-cyan */
    --p4-pale2:#F0F6F8;     /* brightest bloom */
    --p4-dim:rgba(220,235,242,0.42);
  }
  *{box-sizing:border-box;margin:0;padding:0}
  html,body{height:100%}
  body{
    background:var(--p4-near-black);
    color:var(--p4-pale);
    font-family:"Inter",system-ui,sans-serif;
    overflow:hidden;
    -webkit-font-smoothing:antialiased;
  }
  #p4-stage{
    position:fixed;inset:0;
    width:100%;height:100%;
    overflow:hidden;
  }
  /* the chemical ground canvas */
  #p4-ground{position:absolute;inset:0;width:100%;height:100%;display:block;z-index:0}
  /* photogram + develop layer */
  #p4-photo{position:absolute;inset:0;width:100%;height:100%;display:block;z-index:1}
  /* grain overlay via svg turbulence, tiled */
  #p4-grain{
    position:absolute;inset:-10%;width:120%;height:120%;
    z-index:3;pointer-events:none;
    opacity:0.30;mix-blend-mode:overlay;
  }

  /* ---- rest UI ---- */
  #p4-ui{position:absolute;inset:0;z-index:5;display:flex;flex-direction:column;align-items:center;justify-content:center;text-align:center;padding:6vh 7vw;pointer-events:none}
  #p4-ui > *{pointer-events:auto}

  .p4-kicker{
    font-family:"IBM Plex Mono",monospace;
    font-weight:300;
    font-size:clamp(10px,1.5vw,13px);
    letter-spacing:0.30em;
    text-transform:lowercase;
    color:var(--p4-dim);
    margin-bottom:clamp(20px,5vh,52px);
    text-shadow:0 0 18px rgba(27,74,107,0.6);
  }

  /* cycling title during rest + draw */
  #p4-cycle{
    font-family:"Newsreader",serif;
    font-weight:300;
    font-size:clamp(30px,7vw,74px);
    line-height:1.06;
    letter-spacing:-0.01em;
    color:var(--p4-pale2);
    min-height:1.1em;
    text-shadow:0 0 26px rgba(27,74,107,0.9), 0 0 60px rgba(14,46,76,0.7);
    opacity:0;
    transition:opacity .5s ease;
    max-width:14ch;
  }
  #p4-cycle.show{opacity:1}

  /* the landed sermon print */
  #p4-print{
    position:absolute;inset:0;z-index:6;
    display:flex;flex-direction:column;align-items:center;justify-content:center;
    text-align:center;padding:7vh 8vw;
    opacity:0;pointer-events:none;
    transition:opacity 2.2s ease;
  }
  #p4-print.show{opacity:1;pointer-events:auto}
  .p4-print-title{
    font-family:"Newsreader",serif;
    font-weight:400;
    font-size:clamp(34px,8vw,86px);
    line-height:1.02;
    letter-spacing:-0.015em;
    color:var(--p4-pale2);
    max-width:16ch;
    text-shadow:0 0 30px rgba(27,74,107,0.9),0 0 72px rgba(14,46,76,0.6);
  }
  .p4-print-excerpt{
    font-family:"Newsreader",serif;
    font-style:italic;
    font-weight:300;
    font-size:clamp(16px,2.6vw,26px);
    line-height:1.5;
    color:var(--p4-pale);
    opacity:0.9;
    margin-top:clamp(18px,3.4vh,34px);
    max-width:26ch;
    text-shadow:0 0 20px rgba(14,46,76,0.7);
  }
  .p4-print-tag{
    font-family:"IBM Plex Mono",monospace;
    font-weight:300;
    font-size:clamp(10px,1.5vw,13px);
    letter-spacing:0.24em;
    text-transform:lowercase;
    color:var(--p4-dim);
    margin-top:clamp(20px,3.6vh,38px);
  }

  /* audio affordance */
  #p4-audio{
    margin-top:clamp(24px,4.2vh,46px);
    display:flex;flex-direction:column;align-items:center;gap:12px;
    max-width:420px;
  }
  .p4-player{
    display:flex;align-items:center;gap:14px;
    padding:11px 18px;
    border:1px solid rgba(220,235,242,0.22);
    border-radius:2px;
    background:rgba(10,30,51,0.35);
    backdrop-filter:blur(2px);
  }
  .p4-play{
    width:34px;height:34px;flex:0 0 34px;
    border:1px solid rgba(220,235,242,0.4);
    border-radius:50%;
    display:flex;align-items:center;justify-content:center;
    color:var(--p4-pale);
    background:transparent;cursor:not-allowed;
    opacity:0.6;
  }
  .p4-play svg{width:12px;height:12px;margin-left:2px}
  .p4-track{display:flex;flex-direction:column;align-items:flex-start;gap:3px;text-align:left}
  .p4-track .l1{
    font-family:"Inter",sans-serif;font-weight:400;font-size:13px;
    color:var(--p4-pale);letter-spacing:0.01em;
  }
  .p4-track .l2{
    font-family:"IBM Plex Mono",monospace;font-weight:300;font-size:10.5px;
    letter-spacing:0.14em;color:var(--p4-dim);text-transform:lowercase;
  }
  .p4-waveline{
    width:90px;height:20px;flex:0 0 90px;opacity:0.5;
  }
  .p4-audio-note{
    font-family:"IBM Plex Mono",monospace;font-weight:300;
    font-size:10.5px;letter-spacing:0.10em;
    color:rgba(220,235,242,0.34);
    line-height:1.6;max-width:34ch;text-align:center;
  }

  /* the control */
  #p4-control{
    position:absolute;left:0;right:0;bottom:clamp(26px,6vh,58px);
    z-index:8;display:flex;justify-content:center;pointer-events:none;
  }
  #p4-draw{
    pointer-events:auto;
    font-family:"IBM Plex Mono",monospace;
    font-weight:300;font-size:clamp(12px,1.7vw,15px);
    letter-spacing:0.20em;text-transform:lowercase;
    color:var(--p4-pale);
    background:transparent;
    border:1px solid rgba(220,235,242,0.30);
    border-radius:2px;
    padding:13px 26px;cursor:pointer;
    transition:border-color .5s ease,color .5s ease,box-shadow .5s ease,opacity .4s ease;
    text-shadow:0 0 14px rgba(27,74,107,0.7);
  }
  #p4-draw:hover{
    border-color:rgba(220,235,242,0.6);
    color:var(--p4-pale2);
    box-shadow:0 0 26px rgba(27,74,107,0.5);
  }
  #p4-draw:disabled{opacity:0.28;cursor:default}

  /* imperfect exposed edge — a slightly uneven vignette frame */
  #p4-edge{
    position:absolute;inset:0;z-index:4;pointer-events:none;
    box-shadow:
      inset 0 0 clamp(60px,12vw,150px) rgba(5,16,28,0.85),
      inset 0 0 clamp(20px,4vw,50px) rgba(5,16,28,0.6);
  }

  @media (prefers-reduced-motion: reduce){
    #p4-cycle{transition:opacity .2s ease}
    #p4-print{transition:opacity .5s ease}
  }
  @media (max-width:560px){
    #p4-cycle{max-width:11ch}
    .p4-print-excerpt{max-width:22ch}
  }
</style>

<div id="p4-stage">
  <canvas id="p4-ground"></canvas>
  <canvas id="p4-photo"></canvas>
  <div id="p4-edge"></div>

  <!-- SVG grain via feTurbulence -->
  <svg id="p4-grain" xmlns="http://www.w3.org/2000/svg" width="100%" height="100%">
    <filter id="p4-noise">
      <feTurbulence type="fractalNoise" baseFrequency="0.9" numOctaves="2" seed="7" stitchTiles="stitch"/>
      <feColorMatrix type="matrix" values="0 0 0 0 0.06  0 0 0 0 0.18  0 0 0 0 0.30  0 0 0 0.9 0"/>
    </filter>
    <rect width="100%" height="100%" filter="url(#p4-noise)"/>
  </svg>

  <div id="p4-ui">
    <div class="p4-kicker">les archives — a voice, drawn at random</div>
    <div id="p4-cycle"></div>
  </div>

  <div id="p4-print">
    <div class="p4-print-title" id="p4-pt"></div>
    <div class="p4-print-excerpt" id="p4-pe"></div>
    <div class="p4-print-tag" id="p4-pg"></div>
    <div id="p4-audio">
      <div class="p4-player">
        <div class="p4-play" aria-hidden="true">
          <svg viewBox="0 0 12 12"><path d="M2 1 L10 6 L2 11 Z" fill="currentColor"/></svg>
        </div>
        <svg class="p4-waveline" viewBox="0 0 90 20" preserveAspectRatio="none" aria-hidden="true">
          <path id="p4-wave" fill="none" stroke="var(--p4-pale)" stroke-width="1" stroke-linecap="round"></path>
        </svg>
        <div class="p4-track">
          <span class="l1">Deep River — spiritual · from the archive</span>
          <span class="l2">Howard Thurman — the voice</span>
        </div>
      </div>
      <div class="p4-audio-note">audio binds when the recording is cleared.</div>
    </div>
  </div>

  <div id="p4-control">
    <button id="p4-draw" aria-label="Draw a voice from the archive">◦ Draw a voice</button>
  </div>
</div>

<script>
(function(){
  "use strict";
  var SERMONS = [
    ["The Sound of the Genuine","there is a sound of the genuine in you","commencement meditation"],
    ["The Growing Edge","look well to the growing edge","meditation"],
    ["Jesus and the Disinherited","to those with their backs against the wall","the sermon series"],
    ["Freedom and Suffering","the fourth and final sermon","sermon series"],
    ["A Moment of Crisis","bending the will","recorded sermon"],
    ["Disciplines of the Spirit","commitment · suffering · prayer · reconciliation","1963"],
    ["Quests for the Human","the introductory lecture","lecture series"],
    ["Horn of the Wild Oxen","a recorded sermon","from the archive"],
    ["An Easter Message","his eighth talk","recorded sermon"],
    ["Prayers","Thurman reading his prayers aloud","recording"],
    ["Eulogy for Mordecai Wyatt Johnson","for his teacher","recorded"],
    ["On Religious Experience","religion as a deeply personal encounter","meditation"]
  ];
  var DECEL = [90,110,130,160,200,260,340,440,580,760];
  var reduce = window.matchMedia && window.matchMedia("(prefers-reduced-motion: reduce)").matches;

  var ground = document.getElementById("p4-ground");
  var photo  = document.getElementById("p4-photo");
  var gctx = ground.getContext("2d");
  var pctx = photo.getContext("2d");
  var cycleEl = document.getElementById("p4-cycle");
  var uiEl = document.getElementById("p4-ui");
  var printEl = document.getElementById("p4-print");
  var ptEl = document.getElementById("p4-pt");
  var peEl = document.getElementById("p4-pe");
  var pgEl = document.getElementById("p4-pg");
  var drawBtn = document.getElementById("p4-draw");

  var DPR = Math.min(window.devicePixelRatio||1, 2);
  var W=0,H=0;

  // ---- draw a small imperfect waveline for the player ----
  (function(){
    var wp = document.getElementById("p4-wave");
    var d="M0 10"; var n=90;
    for(var x=1;x<=n;x++){
      var a = Math.sin(x*0.5)*Math.sin(x*0.13)*5 + (Math.random()-0.5)*2.2;
      d += " L"+x+" "+(10+a).toFixed(1);
    }
    wp.setAttribute("d", d);
  })();

  // ---- photogram "the many" — camera-less ghost forms ----
  var forms = [];
  function seedForms(){
    forms = [];
    var count = Math.max(10, Math.round((W*H)/(150000)));
    count = Math.min(count, 26);
    for(var i=0;i<count;i++){
      forms.push({
        x: Math.random()*W,
        y: Math.random()*H,
        r: (Math.min(W,H)*0.06) + Math.random()*Math.min(W,H)*0.16,
        kind: Math.floor(Math.random()*4), // 0 leaf/fern 1 hand-ish 2 wave 3 sound-mark
        rot: Math.random()*Math.PI*2,
        seed: Math.random()*1000,
        base: 0.05 + Math.random()*0.12,   // rest opacity
        phase: Math.random()*Math.PI*2,
        bloom: 0.6 + Math.random()*0.8
      });
    }
  }

  function resize(){
    W = window.innerWidth; H = window.innerHeight;
    [ground,photo].forEach(function(c){
      c.width = Math.floor(W*DPR); c.height = Math.floor(H*DPR);
      c.style.width = W+"px"; c.style.height = H+"px";
    });
    gctx.setTransform(DPR,0,0,DPR,0,0);
    pctx.setTransform(DPR,0,0,DPR,0,0);
    seedForms();
    paintGround();
  }

  // ---- the mottled, unevenly-developed cyanotype ground ----
  function paintGround(){
    gctx.setTransform(DPR,0,0,DPR,0,0);
    // base near-black
    gctx.fillStyle = "#05101C";
    gctx.fillRect(0,0,W,H);

    // large uneven exposure gradients (chemical blotching)
    var blobs = 7;
    for(var b=0;b<blobs;b++){
      var cx = (Math.sin(b*2.1)*0.5+0.5)*W;
      var cy = (Math.cos(b*1.7)*0.5+0.5)*H;
      var rad = Math.max(W,H)*(0.35 + (b%3)*0.18);
      var g = gctx.createRadialGradient(cx,cy,0,cx,cy,rad);
      var tone = b%3===0? "#1B4A6B" : (b%3===1? "#0E2E4C":"#0A1E33");
      g.addColorStop(0, hexA(tone, 0.55));
      g.addColorStop(0.5, hexA(tone, 0.22));
      g.addColorStop(1, hexA(tone, 0));
      gctx.globalCompositeOperation = "lighter";
      gctx.fillStyle = g;
      gctx.beginPath(); gctx.arc(cx,cy,rad,0,Math.PI*2); gctx.fill();
    }
    gctx.globalCompositeOperation = "source-over";

    // chemical blotches — darker uneven pooling
    for(var k=0;k<40;k++){
      var x=Math.random()*W, y=Math.random()*H;
      var r=8+Math.random()*70;
      var gg=gctx.createRadialGradient(x,y,0,x,y,r);
      gg.addColorStop(0, "rgba(5,16,28,"+(0.10+Math.random()*0.22)+")");
      gg.addColorStop(1, "rgba(5,16,28,0)");
      gctx.fillStyle=gg;
      gctx.beginPath(); gctx.arc(x,y,r,0,Math.PI*2); gctx.fill();
    }
    // faint lifted flecks (uneven exposure highs)
    for(var f=0;f<26;f++){
      var fx=Math.random()*W, fy=Math.random()*H, fr=4+Math.random()*30;
      var fg=gctx.createRadialGradient(fx,fy,0,fx,fy,fr);
      fg.addColorStop(0,"rgba(27,74,107,"+(0.05+Math.random()*0.10)+")");
      fg.addColorStop(1,"rgba(27,74,107,0)");
      gctx.fillStyle=fg;
      gctx.beginPath(); gctx.arc(fx,fy,fr,0,Math.PI*2); gctx.fill();
    }
  }

  function hexA(hex,a){
    var n=parseInt(hex.slice(1),16);
    return "rgba("+((n>>16)&255)+","+((n>>8)&255)+","+(n&255)+","+a+")";
  }

  // ---- draw a single photogram form (white ghost with halo bloom) ----
  function drawForm(ctx, fm, op){
    ctx.save();
    ctx.translate(fm.x, fm.y);
    ctx.rotate(fm.rot);
    ctx.globalCompositeOperation = "lighter";

    // halo bloom
    var hb = ctx.createRadialGradient(0,0,0,0,0,fm.r*1.7);
    hb.addColorStop(0, "rgba(220,235,242,"+(op*0.5*fm.bloom)+")");
    hb.addColorStop(0.4, "rgba(220,235,242,"+(op*0.14*fm.bloom)+")");
    hb.addColorStop(1, "rgba(220,235,242,0)");
    ctx.fillStyle = hb;
    ctx.beginPath(); ctx.arc(0,0,fm.r*1.7,0,Math.PI*2); ctx.fill();

    ctx.fillStyle = "rgba(240,246,248,"+op+")";
    ctx.strokeStyle = "rgba(240,246,248,"+op+")";

    if(fm.kind===0){ // fern / leaf — a stem with fronds
      ctx.lineWidth = Math.max(1, fm.r*0.05);
      ctx.beginPath(); ctx.moveTo(0,-fm.r); ctx.lineTo(0,fm.r); ctx.stroke();
      var pairs=7;
      for(var i=0;i<pairs;i++){
        var t=-fm.r + (i/(pairs-1))*fm.r*2;
        var len=fm.r*(0.55*(1-Math.abs(t)/(fm.r*1.2)));
        ctx.beginPath();
        ctx.moveTo(0,t); ctx.quadraticCurveTo(len*0.5,t-len*0.35,len,t-len*0.15); ctx.stroke();
        ctx.beginPath();
        ctx.moveTo(0,t); ctx.quadraticCurveTo(-len*0.5,t-len*0.35,-len,t-len*0.15); ctx.stroke();
      }
    } else if(fm.kind===1){ // hand-ish — soft oval palm + fingers
      ctx.beginPath();
      ctx.ellipse(0,fm.r*0.2,fm.r*0.5,fm.r*0.62,0,0,Math.PI*2); ctx.fill();
      for(var d=0;d<4;d++){
        var fa=-0.6+d*0.42;
        var fx=Math.sin(fa)*fm.r*0.5, fy=-fm.r*0.4 - Math.cos(fa)*fm.r*0.2;
        ctx.beginPath();
        ctx.ellipse(fx,fy,fm.r*0.11,fm.r*0.34,fa,0,Math.PI*2); ctx.fill();
      }
    } else if(fm.kind===2){ // wave-form — soft concentric arcs
      for(var w=1;w<=3;w++){
        ctx.lineWidth=Math.max(1,fm.r*0.06);
        ctx.globalAlpha=op*(1-w*0.22);
        ctx.beginPath();
        ctx.arc(0,0,fm.r*(0.4+w*0.28),Math.PI*0.15,Math.PI*0.85); ctx.stroke();
      }
      ctx.globalAlpha=1;
    } else { // sound-mark — vertical bars of varied height (a spectrogram trace)
      var bars=9;
      for(var s=0;s<bars;s++){
        var bh=fm.r*(0.3+Math.abs(Math.sin(s*1.3+fm.seed))*0.9);
        var bx=(-fm.r*0.7)+(s/(bars-1))*fm.r*1.4;
        ctx.globalAlpha=op*0.9;
        ctx.fillRect(bx-fm.r*0.03, -bh/2, fm.r*0.06, bh);
      }
      ctx.globalAlpha=1;
    }
    ctx.restore();
  }

  // ---- state machine ----
  var state = "rest"; // rest | drawing | landed
  var landed = null;
  var t0 = performance.now();
  var developProgress = 0;  // 0..1 during drawing (image coming up)
  var pulsePhase = 0;

  // rest: cycle a soft ghost title slowly
  var restIdx = Math.floor(Math.random()*SERMONS.length);
  var restTimer = 0;
  function restCycle(now){
    if(now - restTimer > 2600){
      restTimer = now;
      restIdx = (restIdx + 1 + Math.floor(Math.random()*3)) % SERMONS.length;
      cycleEl.classList.remove("show");
      setTimeout(function(){
        if(state==="rest"){
          cycleEl.textContent = SERMONS[restIdx][0];
          cycleEl.classList.add("show");
        }
      }, 520);
    }
  }

  // ---- render loop ----
  var running = true;
  function frame(now){
    if(!running){ return; }
    var dt = now - t0; t0 = now;

    // photo layer clear
    pctx.setTransform(DPR,0,0,DPR,0,0);
    pctx.clearRect(0,0,W,H);

    if(state==="rest"){
      // the many at rest — gentle breathing photograms
      for(var i=0;i<forms.length;i++){
        var fm=forms[i];
        fm.phase += 0.0006*dt;
        var op = fm.base * (0.7 + 0.3*Math.sin(fm.phase));
        drawForm(pctx, fm, op);
      }
      if(!reduce) restCycle(now);
    }
    else if(state==="drawing"){
      // image DEVELOPING — forms bloom in and out unevenly, tray coming up
      developProgress = Math.min(1, developProgress + dt/1600);
      for(var j=0;j<forms.length;j++){
        var f=forms[j];
        f.phase += 0.004*dt;
        // uneven bloom: some forms surge, some recede
        var surge = 0.5+0.5*Math.sin(f.phase*f.bloom + f.seed);
        var op = (f.base + 0.25*developProgress) * (0.3 + 0.9*surge);
        drawForm(pctx, f, op);
      }
    }
    else if(state==="landed"){
      // single trace + pulsing bloom
      pulsePhase += dt;
      var pulse = heartbeat(pulsePhase);
      drawLandedForm(pulse);
    }

    rafId = requestAnimationFrame(frame);
  }

  // ~58 bpm lub-dub
  function heartbeat(ms){
    var period = 60000/58; // ms per beat
    var t = (ms % period)/period; // 0..1
    // lub at 0.0, dub at ~0.18, decay
    var lub = Math.exp(-Math.pow((t-0.02)/0.055,2));
    var dub = 0.62*Math.exp(-Math.pow((t-0.20)/0.06,2));
    return Math.min(1, lub+dub);
  }

  var landForm = null;
  function drawLandedForm(pulse){
    if(!landForm) return;
    var cx=W*0.5, cy=H*0.34;
    var r=Math.min(W,H)*0.13;
    pctx.save();
    pctx.translate(cx,cy);
    pctx.globalCompositeOperation="lighter";
    // pulsing halo bloom
    var op = 0.16 + 0.22*pulse;
    var hb = pctx.createRadialGradient(0,0,0,0,0,r*(2.4+pulse*0.5));
    hb.addColorStop(0,"rgba(220,235,242,"+op+")");
    hb.addColorStop(0.45,"rgba(27,74,107,"+(op*0.6)+")");
    hb.addColorStop(1,"rgba(27,74,107,0)");
    pctx.fillStyle=hb;
    pctx.beginPath(); pctx.arc(0,0,r*(2.4+pulse*0.5),0,Math.PI*2); pctx.fill();
    pctx.restore();
    // the single motif itself, steady-ish with slight pulse in brightness
    var m = Object.assign({}, landForm, {x:cx,y:cy,r:r});
    drawForm(pctx, m, 0.5 + 0.25*pulse);
  }

  // ---- the draw sequence ----
  var rafId = null;
  var seq = null;
  function beginDraw(){
    if(state==="drawing") return;
    // reset print
    printEl.classList.remove("show");
    // choose destination
    landed = Math.floor(Math.random()*SERMONS.length);
    landForm = forms.length ? Object.assign({}, forms[Math.floor(Math.random()*forms.length)], {rot:Math.random()*Math.PI*2}) : {kind:2,seed:5,bloom:1,rot:0};

    drawBtn.disabled = true;
    state = "drawing";
    developProgress = 0;
    cycleEl.classList.add("show");

    if(reduce){
      // static print + quick land
      cycleEl.textContent = SERMONS[landed][0];
      setTimeout(function(){ land(); }, 300);
      return;
    }

    // cycle titles decelerating [90..760]
    var step = 0;
    // pad with faster leading spins so it feels like real deceleration
    var lead = [50,55,60,68,76];
    var schedule = lead.concat(DECEL);
    var idx = Math.floor(Math.random()*SERMONS.length);
    function tick(){
      idx = (idx + 1) % SERMONS.length;
      cycleEl.textContent = SERMONS[idx][0];
      step++;
      if(step < schedule.length){
        seq = setTimeout(tick, schedule[step]);
      } else {
        // settle on the drawn one
        cycleEl.textContent = SERMONS[landed][0];
        seq = setTimeout(land, 480);
      }
    }
    tick();
  }

  function land(){
    state = "landed";
    pulsePhase = 0;
    // fade cycle title out, then reveal print
    cycleEl.classList.remove("show");
    uiEl.style.transition = "opacity 1.2s ease";
    uiEl.style.opacity = "0";

    var s = SERMONS[landed];
    ptEl.textContent = s[0];
    peEl.textContent = s[1];
    pgEl.textContent = "— " + s[2];

    setTimeout(function(){
      printEl.classList.add("show");
      drawBtn.textContent = "◦ Draw another";
      drawBtn.disabled = false;
    }, reduce ? 120 : 700);
  }

  drawBtn.addEventListener("click", function(){
    if(state==="landed"){
      // reset to rest field first, then draw again
      printEl.classList.remove("show");
      uiEl.style.opacity = "1";
      state = "rest";
      restTimer = performance.now();
      setTimeout(beginDraw, 260);
    } else {
      uiEl.style.opacity = "1";
      beginDraw();
    }
  });

  // ---- lifecycle ----
  function start(){
    running = true;
    t0 = performance.now();
    if(rafId==null) rafId = requestAnimationFrame(frame);
  }
  function stop(){
    running = false;
    if(rafId!=null){ cancelAnimationFrame(rafId); rafId=null; }
  }
  document.addEventListener("visibilitychange", function(){
    if(document.hidden) stop(); else start();
  });
  window.addEventListener("resize", function(){
    clearTimeout(window.__p4rz);
    window.__p4rz = setTimeout(resize, 160);
  });

  // init
  resize();
  cycleEl.textContent = SERMONS[restIdx][0];
  setTimeout(function(){ if(state==="rest") cycleEl.classList.add("show"); }, 600);
  restTimer = performance.now();
  start();
})();
</script>
