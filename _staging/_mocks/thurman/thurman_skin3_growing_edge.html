<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>The Growing Edge — Howard Thurman</title>
<link rel="preconnect" href="https://fonts.googleapis.com"><link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500&family=Newsreader:ital,opsz,wght@0,18..72,400;0,18..72,500;1,18..72,400&display=swap" rel="stylesheet">
<style>
  :root{ --ground-top:#F4EFE2; --ground-bot:#E4D8BE; --ink:#24302A; --moss:#2C4A38; --fern:#3F7D57; }
  *{box-sizing:border-box}
  body{margin:0;background:#EBE1CB;font-family:'Inter',system-ui,sans-serif;color:var(--ink);
    display:flex;align-items:center;justify-content:center;min-height:100vh;padding:24px}
  .sk3-stage{position:relative;width:min(92vw,560px);min-height:440px;border-radius:18px;overflow:hidden;
    background:linear-gradient(180deg,var(--ground-top) 0%,var(--ground-bot) 100%);
    box-shadow:0 8px 40px rgba(60,48,20,.14)}
  .sk3-canvas{position:absolute;inset:0;z-index:0;display:block}
  .sk3-content{position:relative;z-index:1;text-align:center;padding:38px 30px 34px;
    display:flex;flex-direction:column;align-items:center;gap:12px}
  .sk3-panel{background:rgba(252,249,240,.62);backdrop-filter:blur(2px);border-radius:14px;
    padding:26px 24px;width:100%;max-width:420px}
  .sk3-kicker{font-size:11px;letter-spacing:.28em;text-transform:uppercase;color:var(--moss);font-weight:500}
  .sk3-name{font-size:15px;font-weight:500;color:var(--ink);margin-top:2px;opacity:.82}
  .sk3-title{font-family:'Newsreader',Georgia,serif;font-size:30px;line-height:1.15;font-weight:500;
    color:var(--ink);margin:8px 0 4px;min-height:70px;display:flex;align-items:center;justify-content:center}
  .sk3-excerpt{font-family:'Newsreader',serif;font-style:italic;font-size:16px;color:var(--moss);opacity:.9;min-height:24px}
  .sk3-tag{font-size:11px;letter-spacing:.14em;text-transform:uppercase;color:var(--moss);opacity:.7}
  .sk3-player{margin-top:6px;display:none;flex-direction:column;align-items:center;gap:6px;width:100%}
  .sk3-player audio{width:100%;max-width:300px;height:34px}
  .sk3-note{font-size:10.5px;color:var(--moss);opacity:.6;font-style:italic}
  .sk3-btn{margin-top:16px;border:1px solid var(--moss);background:#fff;color:var(--moss);
    font-family:'Inter',sans-serif;font-size:14px;font-weight:500;padding:11px 26px;border-radius:999px;
    cursor:pointer;transition:background .2s,color .2s}
  .sk3-btn:hover{background:var(--moss);color:#fff}
  .sk3-btn:disabled{opacity:.55;cursor:default}
</style>
</head>
<body>
<div class="sk3-stage" id="sk3-stage">
  <canvas class="sk3-canvas" id="sk3-canvas"></canvas>
  <div class="sk3-content">
    <div class="sk3-panel">
      <div class="sk3-kicker">the growing edge</div>
      <div class="sk3-name">Howard Thurman</div>
      <div class="sk3-title" id="sk3-title">Spin to listen in</div>
      <div class="sk3-excerpt" id="sk3-excerpt">and let one of Thurman's meditations find you</div>
      <div class="sk3-tag" id="sk3-tag"></div>
      <div class="sk3-player" id="sk3-player">
        <audio controls id="sk3-audio"></audio>
        <div class="sk3-note">recording binds when the archive URL is surfaced</div>
      </div>
    </div>
    <button class="sk3-btn" id="sk3-btn">❀ Grow</button>
  </div>
</div>
<script>
(function(){
  var SERMONS = [
  ["The Sound of the Genuine","there is a sound of the genuine in you","commencement meditation"],
  ["The Growing Edge","look well to the growing edge","meditation"],
  ["Jesus and the Disinherited","to those with their backs against the wall","the sermon series"],
  ["Freedom and Suffering","the fourth and final sermon","sermon series"],
  ["A Moment of Crisis","bending the will","recorded sermon"],
  ["Disciplines of the Spirit","commitment · suffering · prayer · reconciliation","1963"],
  ["Quests for the Human","the introductory lecture","lecture series"],
  ["Horn of the Wild Oxen","a recorded sermon","from the archive"],
  ["An Easter Message","his eighth talk","recorded sermon"],
  ["Prayers","Thurman reading his prayers aloud","recording"],
  ["Eulogy for Mordecai Wyatt Johnson","for his teacher","recorded"],
  ["On Religious Experience","religion as a deeply personal encounter","meditation"]
  ];
  var reduce = matchMedia('(prefers-reduced-motion: reduce)').matches;
  var stage=document.getElementById('sk3-stage'),cv=document.getElementById('sk3-canvas'),ctx=cv.getContext('2d');
  var titleEl=document.getElementById('sk3-title'),excEl=document.getElementById('sk3-excerpt'),
      tagEl=document.getElementById('sk3-tag'),btn=document.getElementById('sk3-btn'),player=document.getElementById('sk3-player');
  var W=0,H=0,dpr=Math.min(devicePixelRatio||1,2),t=0,growth=0,intensity=0,bloom=0,visible=true,onscreen=true,raf=0;
  function size(){var r=stage.getBoundingClientRect();W=r.width;H=r.height;cv.width=W*dpr;cv.height=H*dpr;cv.style.width=W+'px';cv.style.height=H+'px';ctx.setTransform(dpr,0,0,dpr,0,0);}
  size();addEventListener('resize',size);
  var rnd=function(s){var x=Math.sin(s)*43758.5453;return x-Math.floor(x);};
  // recursive branch: depth-capped, sway + growth-gated
  function branch(x,y,ang,len,depth,seed){
    if(depth>5||len<8)return;
    var grow=Math.min(1,Math.max(0,growth*1.3-depth*0.14));
    if(grow<=0)return;
    var sway=Math.sin(t*0.0011+seed)*0.05*(1+intensity*1.4);
    var ex=x+Math.cos(ang+sway)*len*grow, ey=y+Math.sin(ang+sway)*len*grow;
    ctx.strokeStyle=depth<2?'#2C4A38':'#3F7D57';
    ctx.lineWidth=Math.max(1,(6-depth)*0.9);ctx.lineCap='round';
    ctx.beginPath();ctx.moveTo(x,y);ctx.lineTo(ex,ey);ctx.stroke();
    // leaf
    if(depth>=2&&grow>0.7){ctx.fillStyle='rgba(63,125,87,.75)';ctx.beginPath();
      ctx.ellipse(ex,ey,4+rnd(seed)*2,2.2,ang,0,6.283);ctx.fill();}
    if(depth===5&&grow>0.85){tipX=ex;tipY=ey;}
    var spread=0.42+rnd(seed*1.7)*0.18;
    branch(ex,ey,ang-spread,len*0.74,depth+1,seed*2.1+1);
    branch(ex,ey,ang+spread,len*0.72,depth+1,seed*3.3+2);
  }
  var tipX=0,tipY=0;
  function drawBloom(){
    if(bloom<=0)return;var b=Math.min(1,bloom);
    ctx.save();ctx.translate(tipX,tipY);ctx.scale(b,b);
    for(var i=0;i<6;i++){ctx.rotate(Math.PI/3);
      ctx.fillStyle=i%2?'rgba(201,126,126,.9)':'rgba(224,169,59,.92)';
      ctx.beginPath();ctx.ellipse(0,-9,4.5,9,0,0,6.283);ctx.fill();}
    ctx.fillStyle='#E0A93B';ctx.beginPath();ctx.arc(0,0,4,0,6.283);ctx.fill();
    ctx.restore();
  }
  function frame(){
    ctx.clearRect(0,0,W,H);
    if(!reduce){growth+=(1-growth)*0.02+intensity*0.008;if(growth>1)growth=1;
      intensity*=0.94;if(bloom>0&&bloom<1)bloom+=0.03;t+=16;}
    else{growth=1;}
    branch(W/2,H-4,-Math.PI/2,H*0.16,0,7.7);
    if(bloom>0)drawBloom();
    if(visible&&onscreen)raf=requestAnimationFrame(frame);
  }
  function start(){if(!raf&&visible&&onscreen)raf=requestAnimationFrame(frame);}
  function stop(){if(raf){cancelAnimationFrame(raf);raf=0;}}
  document.addEventListener('visibilitychange',function(){visible=!document.hidden;visible?start():stop();});
  if('IntersectionObserver'in window){new IntersectionObserver(function(e){onscreen=e[0].isIntersecting;onscreen?start():stop();},{threshold:0.05}).observe(stage);}
  if(reduce){growth=1;ctx.clearRect(0,0,W,H);branch(W/2,H-4,-Math.PI/2,H*0.16,0,7.7);} else start();

  function land(){
    var s=SERMONS[Math.floor(Math.random()*SERMONS.length)];
    titleEl.textContent=s[0];excEl.textContent='"'+s[1]+'"';tagEl.textContent=s[2];
    player.style.display='flex';bloom=0.01;
    btn.disabled=false;btn.textContent='❀ Grow again';
  }
  var DELAYS=[45,45,55,65,80,100,130,170,220,290,380];
  function spin(){
    btn.disabled=true;btn.textContent='❀ growing…';bloom=0;
    if(reduce){var n=0;(function step(){var s=SERMONS[Math.floor(Math.random()*SERMONS.length)];
      titleEl.textContent=s[0];if(++n<3)setTimeout(step,110);else land();})();return;}
    growth=Math.max(growth,0.35);
    var i=0;(function step(){
      var s=SERMONS[Math.floor(Math.random()*SERMONS.length)];
      titleEl.textContent=s[0];intensity=Math.min(1,intensity+0.5);
      if(i<DELAYS.length){setTimeout(step,DELAYS[i]);i++;}else{intensity=0;land();}
    })();
  }
  btn.addEventListener('click',spin);
})();
</script>
<!--
METHODOLOGY FOOTER
HOW PRODUCED: design-SB bakeoff skin (Skin 3 — "The Growing Edge"), 2026-07-03 (S133).
  Howard Thurman "sermon roulette" mechanic; generative growing-branch/bloom canvas background.
  One requestAnimationFrame loop, paused on visibilitychange + IntersectionObserver; dpr capped at 2.
SCHOLARLY SOURCES: Howard Thurman corpus — Jesus and the Disinherited, The Luminous Darkness,
  Deep River, Meditations of the Heart, Disciplines of the Spirit, "The Sound of the Genuine."
  Register: contemplative, rooted, luminous; rendered from his own horizon (the oak of his
  Daytona childhood / the growing edge), no exoticization, no photo (© images).
WHAT NEEDS VERIFICATION: Stage 6 = 0 → sermon titles/glosses/tags are placeholders; excerpt lines
  and audio <src> are UNBOUND. Per §13: verify all quotes against source, bind excerpt + archive
  audio URL to real text/recordings before publication. No invented Thurman lines used.
-->
</body>
</html>
