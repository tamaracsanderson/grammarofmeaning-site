<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<title>The Archive of Hearts — Howard Thurman (LED-wall · deep river)</title>
<link href="https://fonts.googleapis.com/css2?family=Newsreader:ital,opsz,wght@0,6..72,400;0,6..72,500;1,6..72,400;1,6..72,500&family=Inter:wght@400;500&family=IBM+Plex+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
  :root{
    --p2-ground:#081420;
    --p2-ground2:#0A1E33;
    --p2-teal:#7FB6C4;
    --p2-bone:#F1E8D6;
    --p2-dim:#33586a;
    --p2-serif:"Newsreader",Georgia,serif;
    --p2-sans:"Inter",system-ui,sans-serif;
    --p2-mono:"IBM Plex Mono",ui-monospace,monospace;
  }
  *{box-sizing:border-box;margin:0;padding:0}
  html,body{height:100%}
  body{
    background:var(--p2-ground);
    color:var(--p2-bone);
    font-family:var(--p2-sans);
    overflow:hidden;
    -webkit-font-smoothing:antialiased;
  }
  .p2-stage{
    position:fixed;inset:0;
    width:100%;height:100%;
    overflow:hidden;
  }
  #p2-canvas{
    position:absolute;inset:0;
    width:100%;height:100%;
    display:block;
  }
  /* soft vignette so the grid recedes at the edges */
  .p2-vignette{
    position:absolute;inset:0;
    pointer-events:none;
    background:radial-gradient(120% 100% at 50% 46%, rgba(8,20,32,0) 40%, rgba(8,20,32,.74) 100%);
    z-index:2;
  }

  /* ---- top kicker ---- */
  .p2-kicker{
    position:absolute;top:clamp(18px,4vh,42px);left:0;right:0;
    text-align:center;z-index:5;
    font-family:var(--p2-mono);
    font-size:11px;letter-spacing:.28em;text-transform:uppercase;
    color:rgba(127,182,196,.55);
    transition:opacity 1.1s ease;
  }

  /* ---- cycling titles during the draw ---- */
  .p2-cycler{
    position:absolute;left:0;right:0;top:50%;
    transform:translateY(-50%);
    text-align:center;z-index:6;
    font-family:var(--p2-serif);
    font-size:clamp(22px,4.4vw,44px);
    font-weight:400;
    color:rgba(241,232,214,.9);
    letter-spacing:.01em;
    padding:0 8vw;
    opacity:0;pointer-events:none;
    transition:opacity .5s ease;
    text-shadow:0 0 34px rgba(127,182,196,.30);
  }
  .p2-cycler.on{opacity:1}

  /* ---- the landed sermon ---- */
  .p2-card{
    position:absolute;left:0;right:0;top:50%;
    transform:translateY(-50%);
    z-index:7;
    text-align:center;
    padding:0 clamp(22px,8vw,120px);
    opacity:0;pointer-events:none;
    transition:opacity 1.5s ease;
  }
  .p2-card.on{opacity:1;pointer-events:auto}
  .p2-eyebrow{
    font-family:var(--p2-mono);
    font-size:10.5px;letter-spacing:.32em;text-transform:uppercase;
    color:rgba(127,182,196,.55);
    margin-bottom:22px;
  }
  .p2-title{
    font-family:var(--p2-serif);
    font-weight:500;
    font-size:clamp(30px,6vw,64px);
    line-height:1.08;
    color:var(--p2-bone);
    letter-spacing:-.01em;
    text-shadow:0 0 40px rgba(127,182,196,.28);
  }
  .p2-excerpt{
    font-family:var(--p2-serif);
    font-style:italic;
    font-weight:400;
    font-size:clamp(16px,2.5vw,22px);
    line-height:1.5;
    color:rgba(241,232,214,.74);
    max-width:34ch;margin:22px auto 0;
  }
  .p2-source{
    font-family:var(--p2-mono);
    font-size:11px;letter-spacing:.2em;text-transform:uppercase;
    color:rgba(127,182,196,.46);
    margin-top:26px;
  }

  /* ---- audio affordance ---- */
  .p2-audio{
    margin:34px auto 0;
    max-width:420px;
    border:1px solid rgba(127,182,196,.18);
    border-radius:3px;
    background:rgba(10,30,51,.5);
    padding:16px 18px 15px;
    text-align:left;
  }
  .p2-audio-row{display:flex;align-items:center;gap:13px;margin:9px 0}
  .p2-audio-row:first-child{margin-top:0}
  .p2-play{
    flex:0 0 auto;
    width:30px;height:30px;border-radius:50%;
    border:1px solid rgba(127,182,196,.42);
    background:rgba(127,182,196,.07);
    display:flex;align-items:center;justify-content:center;
    color:var(--p2-teal);cursor:default;
  }
  .p2-play svg{display:block}
  .p2-track{flex:1 1 auto;min-width:0}
  .p2-track-name{
    font-family:var(--p2-sans);font-size:12.5px;
    color:rgba(241,232,214,.84);letter-spacing:.01em;
    white-space:nowrap;overflow:hidden;text-overflow:ellipsis;
  }
  .p2-track-sub{
    font-family:var(--p2-mono);font-size:9.5px;letter-spacing:.14em;
    text-transform:uppercase;color:rgba(127,182,196,.40);margin-top:3px;
  }
  .p2-bar{
    height:2px;margin-top:9px;border-radius:2px;
    background:rgba(127,182,196,.14);position:relative;overflow:hidden;
  }
  .p2-bar::after{
    content:"";position:absolute;left:0;top:0;bottom:0;width:22%;
    background:linear-gradient(90deg,rgba(127,182,196,.06),rgba(127,182,196,.44));
  }
  .p2-audio-note{
    font-family:var(--p2-mono);font-size:9.5px;letter-spacing:.1em;
    color:rgba(127,182,196,.34);margin-top:13px;font-style:normal;
  }

  /* ---- control ---- */
  .p2-control{
    position:absolute;left:0;right:0;bottom:clamp(26px,7vh,64px);
    text-align:center;z-index:8;
  }
  .p2-btn{
    font-family:var(--p2-mono);
    font-size:13px;letter-spacing:.22em;text-transform:lowercase;
    color:rgba(241,232,214,.68);
    background:transparent;border:none;cursor:pointer;
    padding:12px 20px;
    transition:color .5s ease,letter-spacing .5s ease,opacity .5s ease;
  }
  .p2-btn:hover{color:var(--p2-bone);letter-spacing:.26em}
  .p2-btn:disabled{opacity:.3;cursor:default}
  .p2-btn .p2-dot{color:var(--p2-teal);margin-right:8px}

  @media (max-width:520px){
    .p2-audio{max-width:none}
    .p2-kicker{font-size:10px;letter-spacing:.22em}
  }
</style>
</head>
<body>
<div class="p2-stage">
  <canvas id="p2-canvas"></canvas>
  <div class="p2-vignette"></div>

  <div class="p2-kicker" id="p2-kicker">les archives — a voice, drawn at random</div>

  <div class="p2-cycler" id="p2-cycler"></div>

  <div class="p2-card" id="p2-card">
    <div class="p2-eyebrow">one heart, out of the many</div>
    <div class="p2-title" id="p2-title"></div>
    <div class="p2-excerpt" id="p2-excerpt"></div>
    <div class="p2-source" id="p2-source"></div>

    <div class="p2-audio">
      <div class="p2-audio-row">
        <div class="p2-play" aria-hidden="true">
          <svg width="10" height="12" viewBox="0 0 10 12"><path d="M0 0 L10 6 L0 12 Z" fill="currentColor"/></svg>
        </div>
        <div class="p2-track">
          <div class="p2-track-name">Deep River — spiritual · from the archive</div>
          <div class="p2-track-sub">beneath the voice</div>
          <div class="p2-bar"></div>
        </div>
      </div>
      <div class="p2-audio-row">
        <div class="p2-play" aria-hidden="true">
          <svg width="10" height="12" viewBox="0 0 10 12"><path d="M0 0 L10 6 L0 12 Z" fill="currentColor"/></svg>
        </div>
        <div class="p2-track">
          <div class="p2-track-name">Howard Thurman — the voice</div>
          <div class="p2-track-sub">the drawn sermon</div>
          <div class="p2-bar"></div>
        </div>
      </div>
      <div class="p2-audio-note">audio binds when the recording is cleared.</div>
    </div>
  </div>

  <div class="p2-control">
    <button class="p2-btn" id="p2-btn"><span class="p2-dot">◦</span><span id="p2-btn-label">Draw a voice</span></button>
  </div>
</div>

<script>
(function(){
  "use strict";

  var SERMONS = [
    ["The Sound of the Genuine","there is a sound of the genuine in you","commencement meditation"],
    ["The Growing Edge","look well to the growing edge","meditation"],
    ["Jesus and the Disinherited","to those with their backs against the wall","the sermon series"],
    ["Freedom and Suffering","the fourth and final sermon","sermon series"],
    ["A Moment of Crisis","bending the will","recorded sermon"],
    ["Disciplines of the Spirit","commitment · suffering · prayer · reconciliation","1963"],
    ["Quests for the Human","the introductory lecture","lecture series"],
    ["Horn of the Wild Oxen","a recorded sermon","from the archive"],
    ["An Easter Message","his eighth talk","recorded sermon"],
    ["Prayers","Thurman reading his prayers aloud","recording"],
    ["Eulogy for Mordecai Wyatt Johnson","for his teacher","recorded"],
    ["On Religious Experience","religion as a deeply personal encounter","meditation"]
  ];

  var DECEL = [90,110,130,160,200,260,340,440,580,760];

  // ---- palette (deep-river blue/teal; linear-ish rgb for cell blend) ----
  var GROUND = [8,20,32];    // deep blue-black
  var DIM    = [26,54,74];   // resting dark-teal cell
  var TEAL   = [46,107,107]; // rising teal
  var CYAN   = [127,182,196];// luminous cyan
  var PALE   = [220,235,242];// palest crest / pulse

  var canvas = document.getElementById('p2-canvas');
  var ctx = canvas.getContext('2d');
  var kicker = document.getElementById('p2-kicker');
  var cycler = document.getElementById('p2-cycler');
  var card = document.getElementById('p2-card');
  var elTitle = document.getElementById('p2-title');
  var elExcerpt = document.getElementById('p2-excerpt');
  var elSource = document.getElementById('p2-source');
  var btn = document.getElementById('p2-btn');
  var btnLabel = document.getElementById('p2-btn-label');

  var prefersReduced = window.matchMedia('(prefers-reduced-motion: reduce)').matches;

  // ---- grid geometry ----
  var W=0,H=0,dpr=1;
  var cell=18;      // css px per cell (target ~14-22)
  var gap=3;        // css px gap between cells
  var pitch=cell+gap;
  var cols=0,rows=0;
  var chosen=null;  // {c,r} the one cell
  // per-cell resting shimmer phase
  var phase=null;

  function buildGrid(){
    // pick a cell size responsive to viewport
    var min = Math.min(W,H);
    cell = min < 520 ? 14 : (min < 900 ? 17 : 20);
    gap = Math.max(2, Math.round(cell*0.17));
    pitch = cell+gap;
    cols = Math.ceil(W/pitch)+1;
    rows = Math.ceil(H/pitch)+1;
    phase = new Float32Array(cols*rows);
    for(var i=0;i<cols*rows;i++){
      phase[i] = Math.random()*Math.PI*2;
    }
  }

  function resize(){
    dpr = Math.min(window.devicePixelRatio||1, 2);
    W = window.innerWidth;
    H = window.innerHeight;
    canvas.width = Math.round(W*dpr);
    canvas.height = Math.round(H*dpr);
    canvas.style.width = W+'px';
    canvas.style.height = H+'px';
    ctx.setTransform(dpr,0,0,dpr,0,0);
    buildGrid();
    if(state==='rest' && prefersReduced) drawStatic();
  }
  window.addEventListener('resize', resize);

  // ---- state machine ----
  var state='rest';   // rest | draw | land
  var running=true;
  var t0=performance.now();

  // draw / land timing
  var drawStart=0, drawStep=0, drawIdx=0, drawTitleIdx=0;
  var landStart=0, landChosen=null;
  var pulseT=0;

  // ---- per-draw randomized wave field (regenerated every beginDraw) ----
  // sources = 1..3 ripple origins that INTERFERE (contributions summed).
  // Each has a random position, speed (propagation), wavelength, phase,
  // amplitude. This makes every draw distinct: sometimes one swelling
  // ripple, sometimes two crossing sets, sometimes three.
  var waveSources = [];
  function seedWave(){
    var n = 1 + Math.floor(Math.random()*3); // 1..3
    waveSources = [];
    for(var i=0;i<n;i++){
      waveSources.push({
        // origin in cell coords; allow slightly off-grid / off-edge origins
        oc: Math.random()*cols,
        or: Math.random()*rows,
        speed: 6 + Math.random()*9,        // cells/sec — deep, slow current range
        wavelength: 5 + Math.random()*10,  // cells between crests
        phase: Math.random()*Math.PI*2,
        amp: 0.55 + Math.random()*0.45     // per-source weight
      });
    }
    // normalize so combined interference stays in a sane range
    var tot=0; for(var j=0;j<waveSources.length;j++) tot+=waveSources[j].amp;
    for(var k=0;k<waveSources.length;k++) waveSources[k].amp /= tot;
  }

  // ---- helpers ----
  function lerp(a,b,t){return a+(b-a)*t;}
  function mix(c1,c2,t){
    return [lerp(c1[0],c2[0],t),lerp(c1[1],c2[1],t),lerp(c1[2],c2[2],t)];
  }
  function quant(v,steps){ // quantize brightness to give LED-stepped feel
    return Math.round(v*steps)/steps;
  }

  // paint one cell with quantized blue/teal brightness b in [0,1]
  function paintCell(cx,cy,b){
    if(b<=0.001) return;
    // color ramp: dim teal -> teal -> cyan -> pale as brightness rises
    var col;
    if(b<0.40){ col = mix(DIM, TEAL, b/0.40); }
    else if(b<0.75){ col = mix(TEAL, CYAN, (b-0.40)/0.35); }
    else { col = mix(CYAN, PALE, (b-0.75)/0.25); }
    var a = 0.12 + b*0.88;
    ctx.fillStyle = 'rgba('+(col[0]|0)+','+(col[1]|0)+','+(col[2]|0)+','+a.toFixed(3)+')';
    ctx.fillRect(cx, cy, cell, cell);
    // faint bloom for the brightest cells (still gridded, just a halo)
    if(b>0.7){
      ctx.fillStyle='rgba('+(PALE[0])+','+(PALE[1])+','+(PALE[2])+','+((b-0.7)*0.16).toFixed(3)+')';
      ctx.fillRect(cx-1, cy-1, cell+2, cell+2);
    }
  }

  function clearGround(){
    ctx.fillStyle = 'rgb('+GROUND[0]+','+GROUND[1]+','+GROUND[2]+')';
    ctx.fillRect(0,0,W,H);
  }

  // center of grid in cell coords
  function gridCenter(){ return {c:(cols-1)/2, r:(rows-1)/2}; }

  // ---- resting field: dim teal cells, slow shimmer ----
  function drawRest(now){
    clearGround();
    var tt = (now - t0)/1000;
    for(var r=0;r<rows;r++){
      for(var c=0;c<cols;c++){
        var idx=r*cols+c;
        var ph=phase[idx];
        // slow, low-amplitude breathing shimmer
        var sh = 0.5 + 0.5*Math.sin(tt*0.5 + ph);
        var b = 0.10 + sh*0.13;                  // dim range
        b = quant(b, 6);
        paintCell(c*pitch, r*pitch, b);
      }
    }
  }

  function drawStatic(){
    clearGround();
    for(var r=0;r<rows;r++){
      for(var c=0;c<cols;c++){
        var idx=r*cols+c;
        var b = quant(0.11 + (Math.sin(phase[idx])*0.5+0.5)*0.10, 5);
        paintCell(c*pitch, r*pitch, b);
      }
    }
  }

  // ---- the draw: deep-river ripples radiate & INTERFERE across the grid ----
  // Each of the 1..3 randomized sources emits an expanding ring whose crest
  // travels at its own speed; contributions are SUMMED so the lit pattern is
  // never the same twice. Brightness quantized per cell (LED-stepped).
  function drawWave(now){
    clearGround();
    var elapsed = (now - drawStart)/1000;
    var tt = (now - t0)/1000;
    var TWO_PI = Math.PI*2;
    for(var r=0;r<rows;r++){
      for(var c=0;c<cols;c++){
        var idx=r*cols+c;
        var env = 0;
        for(var s=0;s<waveSources.length;s++){
          var src = waveSources[s];
          var dc = c - src.oc, dr = r - src.or;
          var dist = Math.sqrt(dc*dc + dr*dr);
          // radius of this ripple's leading crest right now
          var head = elapsed * src.speed;
          // only cells the wavefront has reached (and just behind it) light
          var trailing = head - dist;               // >0 once the front passed
          if(trailing < 0) continue;                // front hasn't arrived
          // travelling sinusoid: crest at the front, ripples behind it
          var ang = (trailing / src.wavelength) * TWO_PI + src.phase;
          var carrier = 0.5 + 0.5*Math.cos(ang);    // 0..1
          // fade the ripple with distance travelled (deep, damped current)
          var decay = Math.exp(-trailing * 0.045);
          // soft leading gate so the very front swells in rather than snapping
          var gate = Math.min(1, trailing*0.5);
          env += src.amp * carrier * decay * gate;
        }
        // deep-river undertow: a slow vertical modulation across the field
        var under = 0.5 + 0.5*Math.sin(tt*0.4 + r*0.28);
        var base = 0.09 + (Math.sin(tt*0.5 + phase[idx])*0.5+0.5)*0.06;
        var b = base + Math.min(1, env)*(0.78*under + 0.22);
        b = Math.min(1, b);
        b = quant(b, 7);             // LED-stepped brightness
        paintCell(c*pitch, r*pitch, b);
      }
    }
  }

  // ---- the land: wave collapses inward, one cell holds & pulses ----
  function drawLand(now){
    clearGround();
    var elapsed=(now-landStart)/1000;
    var tt=(now-t0)/1000;
    var ch = landChosen;
    // collapse envelope: field dims to near-dark over ~1.6s
    var collapse = Math.min(1, elapsed/1.6);
    var fieldFade = 1 - collapse;   // remaining glow of the many
    for(var r=0;r<rows;r++){
      for(var c=0;c<cols;c++){
        var idx=r*cols+c;
        // distance to chosen cell
        var dc=c-ch.c, dr=r-ch.r;
        var dist=Math.sqrt(dc*dc+dr*dr);
        // inward pull: cells near chosen linger a touch longer
        var near = Math.max(0, 1 - dist/(cols*0.5));
        var base = 0.09 + (Math.sin(tt*0.5 + phase[idx])*0.5+0.5)*0.05;
        var b = base*fieldFade + near*0.18*fieldFade;
        if(c===ch.c && r===ch.r){
          // the one heart: swells in, then holds a slow lub-dub
          var rise = Math.min(1, elapsed/1.1);
          // ~58 bpm => 0.9667 s per beat; lub-dub double thump
          var beat = (elapsed*(58/60)) % 1;
          var lub = Math.exp(-Math.pow((beat-0.06)/0.055,2));
          var dub = Math.exp(-Math.pow((beat-0.30)/0.07,2))*0.7;
          var pulse = 0.5 + 0.5*(lub+dub);
          b = lerp(0.16, 0.62 + pulse*0.38, rise);
          b = Math.min(1, b);
          // no quantize on the one — let it breathe smoothly (still a hard-edged cell)
          paintCell(c*pitch, r*pitch, b);
          // a gentle pale-cyan halo ring, gridded outward
          var ringA = rise*(0.10 + pulse*0.12);
          ctx.fillStyle='rgba('+CYAN[0]+','+CYAN[1]+','+CYAN[2]+','+ringA.toFixed(3)+')';
          ctx.fillRect(c*pitch-gap, r*pitch-gap, cell+gap*2, cell+gap*2);
          continue;
        }
        b = quant(Math.max(0,b), 6);
        paintCell(c*pitch, r*pitch, b);
      }
    }
  }

  // reduced-motion land: quick 3-step, then hold pulse
  var rmStep=0, rmStart=0;
  function drawLandReduced(now){
    clearGround();
    var elapsed=(now-rmStart)/1000;
    var ch=landChosen;
    var tt=(now-t0)/1000;
    for(var r=0;r<rows;r++){
      for(var c=0;c<cols;c++){
        var b;
        if(c===ch.c && r===ch.r){
          var beat=(elapsed*(58/60))%1;
          var lub=Math.exp(-Math.pow((beat-0.06)/0.06,2));
          var dub=Math.exp(-Math.pow((beat-0.30)/0.08,2))*0.7;
          b=0.55+0.35*(lub+dub);
        } else {
          b=quant(0.08+(Math.sin(phase[r*cols+c])*0.5+0.5)*0.05,5);
        }
        paintCell(c*pitch,r*pitch,Math.min(1,b));
      }
    }
  }

  // ---- main loop ----
  function frame(now){
    if(!running){ return; }
    if(state==='rest'){
      if(prefersReduced){ /* static already drawn */ }
      else drawRest(now);
    } else if(state==='draw'){
      if(prefersReduced) drawStatic();
      else drawWave(now);
      tickCycler(now);
    } else if(state==='land'){
      if(prefersReduced) drawLandReduced(now);
      else drawLand(now);
    }
    rafId = requestAnimationFrame(frame);
  }

  var rafId=null;
  function start(){ if(!rafId) rafId=requestAnimationFrame(frame); }
  function stop(){ if(rafId){ cancelAnimationFrame(rafId); rafId=null; } }

  // ---- draw cycler (decelerating titles) ----
  function tickCycler(now){
    var since = now - drawStep;
    var wait = DECEL[Math.min(drawIdx, DECEL.length-1)];
    if(since >= wait){
      drawStep = now;
      drawTitleIdx = (drawTitleIdx + 1 + Math.floor(Math.random()*3)) % SERMONS.length;
      cycler.textContent = SERMONS[drawTitleIdx][0];
      drawIdx++;
      if(drawIdx >= DECEL.length){
        // last tick shown — resolve to the drawn sermon after final dwell
        // hold the final title briefly, then land
        setTimeout(land, DECEL[DECEL.length-1] + 140);
        state='holdlast';
      }
    }
  }

  var finalPick=0;

  function beginDraw(){
    card.classList.remove('on');
    kicker.style.opacity='0';
    finalPick = Math.floor(Math.random()*SERMONS.length);
    seedWave();                       // NEW randomized ripple field each draw
    drawStart = performance.now();
    drawStep = drawStart;
    drawIdx = 0;
    drawTitleIdx = Math.floor(Math.random()*SERMONS.length);
    cycler.textContent = SERMONS[drawTitleIdx][0];
    cycler.classList.add('on');
    state='draw';
    btn.disabled=true;
    btnLabel.textContent='drawing…';

    if(prefersReduced){
      // quick sequence: flash a few titles fast then land
      var seq=0;
      (function flick(){
        if(seq<3){
          cycler.textContent = SERMONS[Math.floor(Math.random()*SERMONS.length)][0];
          seq++; setTimeout(flick,180);
        } else {
          land();
        }
      })();
    }
  }

  function land(){
    // settle the cycler to the final title, then reveal card
    cycler.textContent = SERMONS[finalPick][0];
    // choose a cell (avoid extreme edges) — random every draw
    var m=2;
    landChosen = {
      c: m + Math.floor(Math.random()*(cols-2*m)),
      r: m + Math.floor(Math.random()*(rows-2*m))
    };
    chosen = landChosen;
    landStart = performance.now();
    rmStart = landStart;
    state='land';

    // fade cycler out, fill card, fade card in
    cycler.classList.remove('on');
    var s = SERMONS[finalPick];
    elTitle.textContent = s[0];
    elExcerpt.textContent = '“'+s[1]+'”';
    elSource.textContent = s[2];

    setTimeout(function(){
      card.classList.add('on');
      btn.disabled=false;
      btnLabel.textContent='Draw another';
    }, prefersReduced ? 300 : 900);
  }

  btn.addEventListener('click', function(){
    if(state==='draw' || state==='holdlast') return;
    if(state==='land'){
      // draw another: dim card, reset to draw
      card.classList.remove('on');
      setTimeout(beginDraw, 520);
    } else {
      beginDraw();
    }
  });

  // ---- visibility + off-screen pausing ----
  document.addEventListener('visibilitychange', function(){
    if(document.hidden){ running=false; stop(); }
    else { running=true; start(); }
  });

  if('IntersectionObserver' in window){
    var io = new IntersectionObserver(function(entries){
      entries.forEach(function(e){
        if(e.isIntersecting){ running=true; start(); }
        else { running=false; stop(); }
      });
    }, {threshold:0.01});
    io.observe(canvas);
  }

  // ---- init ----
  resize();
  if(prefersReduced){ drawStatic(); }
  start();

})();
</script>
