<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Water lab — live pixelize / palette / shape</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Newsreader:ital,opsz,wght@0,6..72,400;0,6..72,500;1,6..72,400&family=Inter:wght@400;500&family=IBM+Plex+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
  :root{--serif:'Newsreader',Georgia,serif;--sans:'Inter',system-ui,sans-serif;--mono:'IBM Plex Mono',monospace;--gold:#E7C97A;--bone:#F3E4BC;}
  *{box-sizing:border-box;}
  html,body{margin:0;height:100%;}
  body{background:#0A0C0A;color:var(--bone);font-family:var(--serif);overflow:hidden;-webkit-font-smoothing:antialiased;}
  #cv{position:fixed;inset:0;width:100%;height:100%;display:block;}
  video{display:none;}
  .overlay{position:fixed;inset:0;z-index:2;display:flex;flex-direction:column;align-items:center;justify-content:center;text-align:center;pointer-events:none;padding:40px;transition:opacity .5s;}
  .overlay.off{opacity:0;}
  .kick{font-family:var(--mono);font-size:12px;letter-spacing:.28em;text-transform:uppercase;color:rgba(231,201,122,.7);margin-bottom:18px;}
  .who{font-family:var(--serif);font-style:italic;font-size:16px;color:rgba(243,228,188,.72);margin-bottom:12px;}
  .title{font-family:var(--serif);font-weight:500;font-size:clamp(36px,6.5vw,78px);line-height:1.06;color:var(--gold);margin:0;text-shadow:0 2px 30px rgba(0,0,0,.5);max-width:16ch;}
  /* control bar */
  .bar{position:fixed;left:50%;bottom:20px;transform:translateX(-50%);z-index:5;display:flex;flex-wrap:wrap;gap:10px;align-items:center;justify-content:center;
    background:rgba(10,13,10,.72);backdrop-filter:blur(8px);border:1px solid rgba(231,201,122,.25);border-radius:14px;padding:10px 14px;max-width:94vw;}
  .grp{display:flex;align-items:center;gap:6px;padding:0 8px;border-right:1px solid rgba(231,201,122,.16);}
  .grp:last-child{border-right:0;}
  .grp .lbl{font-family:var(--mono);font-size:9px;letter-spacing:.14em;text-transform:uppercase;color:rgba(243,228,188,.45);margin-right:2px;}
  button{font-family:var(--mono);font-size:11.5px;letter-spacing:.04em;color:var(--bone);background:rgba(20,26,18,.6);border:1px solid rgba(231,201,122,.28);border-radius:8px;padding:7px 11px;cursor:pointer;transition:background .2s,border-color .2s,color .2s;}
  button:hover{background:rgba(40,48,30,.7);}
  button.on{background:var(--gold);color:#1a1608;border-color:var(--gold);}
  .val{font-family:var(--mono);font-size:11px;color:var(--gold);min-width:2.4em;text-align:center;}
  .sw{width:15px;height:15px;border-radius:4px;display:inline-block;margin-right:5px;vertical-align:-2px;border:1px solid rgba(0,0,0,.3);}
  .hint{position:fixed;top:14px;left:16px;z-index:5;font-family:var(--mono);font-size:10px;letter-spacing:.1em;color:rgba(243,228,188,.4);}
</style>
</head>
<body>
<canvas id="cv"></canvas>
<video id="vid" muted loop playsinline autoplay></video>

<div class="overlay" id="overlay">
  <div class="kick">les archives — a voice, drawn at random</div>
  <div class="who">Howard Thurman</div>
  <h1 class="title">The Sound of the Genuine</h1>
</div>

<div class="hint">live transform · pixelizing real footage in the browser</div>

<div class="bar">
  <div class="grp"><span class="lbl">palette</span>
    <button data-pal="green"><span class="sw" style="background:#3F7D57"></span>green</button>
    <button data-pal="blue"><span class="sw" style="background:#276B7E"></span>blue</button>
    <button data-pal="ink" class="on"><span class="sw" style="background:#5A5442"></span>ink</button>
    <button data-pal="ember"><span class="sw" style="background:#C9862F"></span>ember</button>
    <button data-pal="tide"><span class="sw" style="background:#3E8A7E"></span>tide</button>
    <button data-pal="nocturne"><span class="sw" style="background:#6E4A63"></span>nocturne</button>
    <button data-pal="slate"><span class="sw" style="background:#6E6E63"></span>slate</button>
    <button data-pal="dusk"><span class="sw" style="background:#7A4A5A"></span>dusk</button>
    <button data-pal="abyss"><span class="sw" style="background:#1E6472"></span>abyss</button>
    <button data-pal="rust"><span class="sw" style="background:#C4602F"></span>rust</button>
    <button data-pal="gilt"><span class="sw" style="background:#8A7028"></span>gilt</button>
  </div>
  <div class="grp"><span class="lbl">pixels</span>
    <button id="pMinus">– bigger</button><span class="val" id="pVal">140</span><button id="pPlus">smaller +</button>
  </div>
  <div class="grp"><span class="lbl">shape</span>
    <button data-shape="square">▪ square</button>
    <button data-shape="circle">● circle</button>
    <button data-shape="round" class="on">▢ round</button>
  </div>
  <div class="grp"><span class="lbl">water</span>
    <button id="clip">↻ another</button>
  </div>
  <div class="grp"><span class="lbl">text</span>
    <button id="txt" class="on">on</button>
  </div>
</div>

<script>
(function(){
  var CLIPS=['./raw_1.mp4','./raw_2.mp4','./raw_3.mp4','./raw_4.mp4','./raw_5.mp4','./raw_6.mp4'];
  var PALS={
    green:['#1E2722','#24302A','#2C4A38','#3F7D57','#8AA88B','#C9A227','#F3E4BC'],
    blue :['#06101A','#0B2233','#15405C','#276B7E','#4E9AAE','#9FCAD6','#EAF6F8'],
    ink  :['#14140F','#242019','#3A362B','#5A5442','#89826A','#B6AE92','#EDE6CE'],
    ember:['#0C0A08','#241812','#4A2E1E','#8A5A2E','#C9862F','#E7C97A','#F6ECD2'],
    tide :['#06101A','#0C2A38','#1B5560','#3E8A7E','#8AA86A','#E0C24A','#F3E4BC'],
    nocturne:['#0A0A16','#1E1B36','#3E2E52','#6E4A63','#A86B5E','#D8A24A','#F0DCC0'],
    slate:['#141618','#2A2E30','#454A48','#6E6E63','#9A907A','#C4B79A','#EDE4CE'],
    dusk:['#0E0A14','#241A2E','#46304E','#7A4A5A','#B0725A','#E0A94A','#F3E0C0'],
    abyss:['#04080E','#081A26','#103A48','#1E6472','#3E9A94','#C9A227','#EDE0B0'],
    rust:['#100A08','#2A160E','#52281A','#8A4A2E','#C4602F','#E0A93B','#F3E4C4'],
    gilt:['#0A0A08','#1A1810','#332C18','#5A4A20','#8A7028','#C9A227','#F3E4BC']
  };
  var BG='#0A0C0A';
  var cv=document.getElementById('cv'), ctx=cv.getContext('2d');
  var vid=document.getElementById('vid');
  var oc=document.createElement('canvas'), octx=oc.getContext('2d',{willReadFrequently:true});
  var W=0,H=0, cellsAcross=140, shape='round', clipIx=0, LUT=null;

  function hex(h){return [parseInt(h.slice(1,3),16),parseInt(h.slice(3,5),16),parseInt(h.slice(5,7),16)];}
  function buildLUT(stops){ var s=stops.map(hex), n=s.length-1, L=new Array(256);
    for(var i=0;i<256;i++){ var t=i/255*n, k=Math.floor(t), f=t-k; if(k>=n){k=n-1;f=1;}
      var a=s[k], b=s[k+1];
      L[i]=[ (a[0]+(b[0]-a[0])*f)|0, (a[1]+(b[1]-a[1])*f)|0, (a[2]+(b[2]-a[2])*f)|0 ]; }
    return L; }
  LUT=buildLUT(PALS.ink);

  function resize(){ W=cv.width=window.innerWidth; H=cv.height=window.innerHeight; }
  window.addEventListener('resize',resize); resize();

  function coverGeom(vw,vh,ta){ var va=vw/vh, sx,sy,sw,sh;
    if(va>ta){ sh=vh; sw=vh*ta; sx=(vw-sw)/2; sy=0; } else { sw=vw; sh=vw/ta; sx=0; sy=(vh-sh)/2; }
    return [sx,sy,sw,sh]; }

  function frame(){
    if(vid.readyState>=2 && vid.videoWidth){
      var cw=cellsAcross, ch=Math.max(1, Math.round(cellsAcross * (H/W)));
      oc.width=cw; oc.height=ch;
      var g=coverGeom(vid.videoWidth, vid.videoHeight, cw/ch);
      octx.drawImage(vid, g[0],g[1],g[2],g[3], 0,0,cw,ch);
      var d=octx.getImageData(0,0,cw,ch).data;
      var cellW=W/cw, cellH=H/ch;
      ctx.fillStyle=BG; ctx.fillRect(0,0,W,H);
      var gap = shape==='square' ? Math.max(1,cellW*0.07) : 0;
      for(var y=0;y<ch;y++){ for(var x=0;x<cw;x++){
        var i=(y*cw+x)*4;
        var lum=(0.299*d[i]+0.587*d[i+1]+0.114*d[i+2])|0;
        var c=LUT[lum];
        ctx.fillStyle='rgb('+c[0]+','+c[1]+','+c[2]+')';
        var px=x*cellW, py=y*cellH;
        if(shape==='square'){ ctx.fillRect(px+gap, py+gap, cellW-gap*2, cellH-gap*2); }
        else if(shape==='circle'){ ctx.beginPath(); ctx.arc(px+cellW/2, py+cellH/2, Math.min(cellW,cellH)*0.44, 0, 6.283); ctx.fill(); }
        else { var r=Math.min(cellW,cellH)*0.28, gp=Math.max(1,cellW*0.06); rr(px+gp,py+gp,cellW-gp*2,cellH-gp*2,r); ctx.fill(); }
      }}
    }
    requestAnimationFrame(frame);
  }
  function rr(x,y,w,h,r){ ctx.beginPath(); ctx.moveTo(x+r,y); ctx.arcTo(x+w,y,x+w,y+h,r); ctx.arcTo(x+w,y+h,x,y+h,r); ctx.arcTo(x,y+h,x,y,r); ctx.arcTo(x,y,x+w,y,r); ctx.closePath(); }

  function loadClip(i){ clipIx=(i+CLIPS.length)%CLIPS.length; vid.src=CLIPS[clipIx]; vid.load(); var p=vid.play(); if(p&&p.catch)p.catch(function(){}); }
  loadClip(0); requestAnimationFrame(frame);

  // controls
  function sel(attr,val,el){ document.querySelectorAll('button['+attr+']').forEach(function(b){ b.classList.toggle('on', b.getAttribute(attr)===val); }); }
  document.querySelectorAll('button[data-pal]').forEach(function(b){ b.addEventListener('click',function(){ LUT=buildLUT(PALS[b.dataset.pal]); sel('data-pal',b.dataset.pal); }); });
  document.querySelectorAll('button[data-shape]').forEach(function(b){ b.addEventListener('click',function(){ shape=b.dataset.shape; sel('data-shape',shape); }); });
  var pVal=document.getElementById('pVal');
  document.getElementById('pMinus').addEventListener('click',function(){ cellsAcross=Math.max(24,cellsAcross-16); pVal.textContent=cellsAcross; });
  document.getElementById('pPlus').addEventListener('click',function(){ cellsAcross=Math.min(220,cellsAcross+16); pVal.textContent=cellsAcross; });
  document.getElementById('clip').addEventListener('click',function(){ loadClip(clipIx+1); });
  var ov=document.getElementById('overlay'), tb=document.getElementById('txt');
  tb.addEventListener('click',function(){ var off=ov.classList.toggle('off'); tb.textContent=off?'off':'on'; tb.classList.toggle('on',!off); });
})();
</script>
</body>
</html>
