<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Deep River — Howard Thurman</title>
<link rel="preconnect" href="https://fonts.googleapis.com"><link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Newsreader:ital,opsz,wght@0,6..72,400;0,6..72,500;1,6..72,400&family=Inter:wght@400;500&display=swap" rel="stylesheet">
<style>
  :root{ --ground:#041D22; --cream:#F0E6D2; --aqua:#7Fc6c9; }
  *{box-sizing:border-box}
  body{margin:0;background:var(--ground);min-height:100vh;display:flex;align-items:center;justify-content:center;font-family:'Inter',sans-serif;color:var(--cream)}
  .sk2-stage{position:relative;width:min(92vw,560px);min-height:440px;border-radius:14px;overflow:hidden;
    background:linear-gradient(180deg,#0A4A54 0%,#06323A 48%,#041D22 100%);box-shadow:0 24px 70px rgba(0,0,0,.45)}
  .sk2-canvas{position:absolute;inset:0;z-index:0;width:100%;height:100%}
  .sk2-content{position:relative;z-index:1;text-align:center;padding:52px 34px;display:flex;flex-direction:column;align-items:center;gap:14px}
  .sk2-kicker{font-size:11px;letter-spacing:.36em;text-transform:uppercase;color:var(--aqua);opacity:.85}
  .sk2-name{font-family:'Inter';font-weight:500;font-size:14px;letter-spacing:.04em;color:#cfeeea;opacity:.9}
  .sk2-title{font-family:'Newsreader',serif;font-weight:500;font-size:33px;line-height:1.15;color:var(--cream);margin:2px 0;
    transition:opacity .5s ease,transform .7s ease;min-height:44px}
  .sk2-title.sk2-rise{opacity:0;transform:translateY(26px)}
  .sk2-excerpt{font-family:'Newsreader',serif;font-style:italic;font-size:16px;line-height:1.5;color:#dfeee9;opacity:.92;max-width:34ch}
  .sk2-tag{font-size:10.5px;letter-spacing:.22em;text-transform:uppercase;color:var(--aqua);opacity:.7}
  .sk2-btn{margin-top:10px;font-family:'Inter';font-size:14px;letter-spacing:.06em;color:var(--cream);
    background:rgba(46,124,134,.4);border:1px solid rgba(127,198,201,.45);padding:11px 26px;border-radius:40px;cursor:pointer;
    backdrop-filter:blur(2px);transition:background .3s}
  .sk2-btn:hover{background:rgba(46,124,134,.62)}
  .sk2-btn:disabled{opacity:.5;cursor:default}
  .sk2-player{margin-top:6px;display:none;flex-direction:column;align-items:center;gap:6px}
  .sk2-player.sk2-on{display:flex}
  .sk2-player audio{width:230px;height:34px;filter:sepia(.15) saturate(.8) opacity(.92)}
  .sk2-note{font-size:10px;letter-spacing:.06em;color:var(--aqua);opacity:.6;font-style:italic}
</style>
</head>
<body>
  <div class="sk2-stage" id="sk2Stage">
    <canvas class="sk2-canvas" id="sk2Canvas"></canvas>
    <div class="sk2-content">
      <div class="sk2-kicker">deep river</div>
      <div class="sk2-name">Howard Thurman</div>
      <h1 class="sk2-title" id="sk2Title">Spin to listen in</h1>
      <div class="sk2-excerpt" id="sk2Excerpt">and let one of Thurman&rsquo;s meditations find you</div>
      <div class="sk2-tag" id="sk2Tag"></div>
      <button class="sk2-btn" id="sk2Btn">&#8776; Cast</button>
      <div class="sk2-player" id="sk2Player">
        <audio controls id="sk2Audio"></audio>
        <div class="sk2-note">recording binds when the archive URL is surfaced</div>
      </div>
    </div>
  </div>
<script>
(function(){
  var SERMONS = [
    ["The Sound of the Genuine","there is a sound of the genuine in you","commencement meditation"],
    ["The Growing Edge","look well to the growing edge","meditation"],
    ["Jesus and the Disinherited","to those with their backs against the wall","the sermon series"],
    ["Freedom and Suffering","the fourth and final sermon","sermon series"],
    ["A Moment of Crisis","bending the will","recorded sermon"],
    ["Disciplines of the Spirit","commitment · suffering · prayer · reconciliation","1963"],
    ["Quests for the Human","the introductory lecture","lecture series"],
    ["Horn of the Wild Oxen","a recorded sermon","from the archive"],
    ["An Easter Message","his eighth talk","recorded sermon"],
    ["Prayers","Thurman reading his prayers aloud","recording"],
    ["Eulogy for Mordecai Wyatt Johnson","for his teacher","recorded"],
    ["On Religious Experience","religion as a deeply personal encounter","meditation"]
  ];
  var DELAYS=[45,45,55,65,80,100,130,170,220,290,380];
  var reduce=matchMedia('(prefers-reduced-motion: reduce)').matches;
  var titleEl=document.getElementById('sk2Title'),excEl=document.getElementById('sk2Excerpt'),tagEl=document.getElementById('sk2Tag');
  var btn=document.getElementById('sk2Btn'),player=document.getElementById('sk2Player'),stage=document.getElementById('sk2Stage');
  var cv=document.getElementById('sk2Canvas'),ctx=cv.getContext('2d');
  var W=0,H=0,dpr=Math.min(devicePixelRatio||1,2);
  function size(){var r=stage.getBoundingClientRect();W=r.width;H=r.height;cv.width=W*dpr;cv.height=H*dpr;ctx.setTransform(dpr,0,0,dpr,1*0,0);ctx.scale(1,1);ctx.setTransform(dpr,0,0,dpr,0,0);}
  window.addEventListener('resize',size);size();
  var motes=[];for(var i=0;i<16;i++)motes.push({x:Math.random(),y:Math.random(),r:Math.random()*1.8+.6,sp:Math.random()*.0006+.0002});
  var t=0,intensity=0,visible=true,onScreen=true;
  var LAYERS=[{amp:9,len:150,sp:.6,col:'rgba(46,124,134,.55)',base:.20},
              {amp:7,len:105,sp:.9,col:'rgba(127,198,201,.32)',base:.28},
              {amp:5,len:70,sp:1.3,col:'rgba(191,230,223,.22)',base:.14}];
  function draw(){
    ctx.clearRect(0,0,W,H);
    // deep water body
    var g=ctx.createLinearGradient(0,H*.34,0,H);g.addColorStop(0,'rgba(6,50,58,.0)');g.addColorStop(1,'rgba(4,29,34,.55)');
    ctx.fillStyle=g;ctx.fillRect(0,H*.34,W,H*.66);
    var boost=1+intensity*2.4, spd=1+intensity*2.2;
    for(var l=0;l<LAYERS.length;l++){
      var L=LAYERS[l],y0=H*(L.base);
      ctx.beginPath();ctx.moveTo(0,y0);
      for(var x=0;x<=W;x+=6){
        var y=y0+Math.sin(x/L.len + t*L.sp*spd + l*1.4)*L.amp*boost
                 +Math.sin(x/(L.len*.5) - t*L.sp*spd*.6)*L.amp*.4*boost;
        ctx.lineTo(x,y);
      }
      ctx.lineTo(W,H*.42);ctx.lineTo(0,H*.42);ctx.closePath();
      ctx.fillStyle=L.col;ctx.fill();
      // foam crest highlights
      if(l===0){ctx.strokeStyle='rgba(191,230,223,'+(.14+intensity*.2)+')';ctx.lineWidth=1;ctx.beginPath();
        for(var x2=0;x2<=W;x2+=6){var yy=y0+Math.sin(x2/L.len + t*L.sp*spd)*L.amp*boost;if(x2===0)ctx.moveTo(x2,yy);else ctx.lineTo(x2,yy);}
        ctx.stroke();}
    }
    // rising light-motes
    for(var m=0;m<motes.length;m++){var p=motes[m];p.y-=p.sp*(1+intensity);if(p.y<0){p.y=1;p.x=Math.random();}
      ctx.globalAlpha=(1-p.y)*.5+.08;ctx.fillStyle='rgba(191,230,223,.9)';
      ctx.beginPath();ctx.arc(p.x*W,p.y*H,p.r,0,7);ctx.fill();ctx.globalAlpha=1;}
  }
  var raf=null;
  function loop(){t+=.02;if(intensity>0.001)intensity*=.965;draw();raf=requestAnimationFrame(loop);}
  function run(on){if(reduce){draw();return;}if(on&&!raf&&visible&&onScreen)loop();if(!on&&raf){cancelAnimationFrame(raf);raf=null;}}
  document.addEventListener('visibilitychange',function(){visible=!document.hidden;run(visible);});
  if('IntersectionObserver'in window){new IntersectionObserver(function(e){onScreen=e[0].isIntersecting;run(onScreen);},{threshold:0.05}).observe(stage);}
  run(true);

  function rnd(){return SERMONS[Math.floor(Math.random()*SERMONS.length)];}
  function set(s){titleEl.textContent=s[0];}
  function land(s){
    titleEl.classList.add('sk2-rise');
    setTimeout(function(){
      titleEl.textContent=s[0];excEl.textContent='“'+s[1]+'”';tagEl.textContent=s[2];
      titleEl.classList.remove('sk2-rise');player.classList.add('sk2-on');
      btn.disabled=false;btn.innerHTML='&#8776; Cast again';
    },140);
  }
  function spin(){
    btn.disabled=true;
    if(reduce){var c=0;var seq=setInterval(function(){set(rnd());if(++c>=3){clearInterval(seq);land(rnd());}},110);return;}
    var i=0;
    function step(){
      intensity=Math.min(1,0.25+i*0.08);
      set(rnd());
      if(i<DELAYS.length){var d=DELAYS[i++];setTimeout(step,d);}
      else{land(rnd());}
    }
    step();
  }
  btn.addEventListener('click',spin);
})();
</script>
<!--
METHODOLOGY FOOTER
HOW PRODUCED: design-SB bakeoff skin (Skin 2 — Deep River / The Waters), 2026-07-03 (S133).
  Thurman "sermon roulette" — spin lands on a random Howard Thurman sermon. Oceanic generative-wave
  background (smooth sine layers + foam crests + rising light-motes; wave FEEL referenced from
  thewayofcode.com/#5 but rendered smooth/mystical, not pixel-kitsch). One rAF loop, paused on
  hidden tab + off-screen (IntersectionObserver); dpr capped at 2; prefers-reduced-motion honored.
SCHOLARLY SOURCES: Howard Thurman — Jesus and the Disinherited; The Luminous Darkness; Deep River;
  Meditations of the Heart; Disciplines of the Spirit; "The Sound of the Genuine" (commencement).
  Rendered from Thurman's own horizon (mystic + rooted); no © photo used; register = "the genuine."
WHAT NEEDS VERIFICATION: Stage 6 = 0 coded passages — the excerpt GLOSSES and the <audio> src are
  PLACEHOLDERS. They bind to real archive text/URLs later (§13, no invented Thurman lines; verify all
  quotes against source recordings/texts before publication). Sermon titles/tags are catalog labels,
  not verbatim transcript quotes.
-->
</body>
</html>
